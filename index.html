<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golpoboliyer Kheror Khata | গল্পবলিয়ের খেরোর খাতা</title>
    <meta name="theme-color" content="#080808">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+Bengali:wght@400;600;700&family=Courier+Prime&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bgDeep: '#080808',
                        bgCard: '#0f0f0f',
                        gold: '#d4af37',
                        goldDim: '#8b7324',
                        textDim: '#737373',
                        textFaint: '#4a4a4a',
                        borderFaint: '#2a261b'
                    },
                    fontFamily: {
                        serif: ['Cinzel', 'Noto Serif Bengali', 'serif'],
                        body: ['Merriweather', 'Noto Serif Bengali', 'serif'],
                        mono: ['Courier Prime', 'monospace']
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { background-color: #080808; color: #d4af37; font-family: 'Merriweather', 'Noto Serif Bengali', serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #080808; }
        ::-webkit-scrollbar-thumb { background: #2a261b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b7324; }
        .distraction-free { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 50; background: #050505; padding: 2rem 10%; }
        textarea:focus, input:focus, select:focus { outline: none; }
        
        /* Subtle glow effect for active elements */
        .glow-text { text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error(error);
                }
            };
            return [storedValue, setValue];
        }

        const Dashboard = ({ projects, setProjects, openProject }) => {
            const [isCreating, setIsCreating] = useState(false);
            const [newProj, setNewProj] = useState({ title: '', type: 'Audiobook Script', status: 'Active', deadline: '' });

            const shelves = ['Audiobook Script', 'Novel', 'Video Script', 'Shorts Script'];

            const handleCreate = (e) => {
                e.preventDefault();
                const project = {
                    id: Date.now().toString(),
                    ...newProj,
                    createdAt: new Date().toISOString(),
                    scenes: [{ id: Date.now().toString() + 's', title: 'Chapter 1', content: '' }],
                    tasks: []
                };
                setProjects([...projects, project]);
                setIsCreating(false);
                setNewProj({ title: '', type: 'Audiobook Script', status: 'Active', deadline: '' });
            };

            const totalScenes = projects.reduce((acc, p) => acc + (p.scenes?.length || 0), 0);
            const totalTasks = projects.reduce((acc, p) => acc + (p.tasks?.length || 0), 0);
            const completedTasks = projects.reduce((acc, p) => acc + (p.tasks?.filter(t => t.completed)?.length || 0), 0);
            const completionRate = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);

            return (
                <div className="p-6 max-w-5xl mx-auto min-h-screen pt-12">
                    {/* Header Section */}
                    <div className="flex flex-col items-center mb-16">
                        <span className="text-textDim text-[10px] tracking-[0.4em] uppercase mb-4 font-mono">
                            M a n u s c r i p t   J o u r n a l  •  গ ল্প ব লি য়ে  অ ভি যা ত্রি ক
                        </span>
                        <h1 className="text-4xl text-gold font-serif mb-4 glow-text text-center leading-tight">
                            গল্পবলিয়ের খেরোর খাতা
                        </h1>
                        <span className="text-textFaint text-[10px] tracking-[0.2em] uppercase font-mono mb-10">
                            W r i t e r ' s   C o r e   S y s t e m
                        </span>

                        {/* Stats Row */}
                        <div className="flex flex-wrap justify-center gap-8 md:gap-16 text-center border-b border-borderFaint pb-10 w-full max-w-3xl">
                             <div>
                                <div className="text-3xl text-gold font-serif mb-1">{projects.length}</div>
                                <div className="text-[9px] text-textDim tracking-widest uppercase font-mono">Active Projects</div>
                             </div>
                             <div>
                                <div className="text-3xl text-gold font-serif mb-1">{totalScenes}</div>
                                <div className="text-[9px] text-textDim tracking-widest uppercase font-mono">Total Scenes</div>
                             </div>
                             <div>
                                <div className="text-3xl text-gold font-serif mb-1">{completionRate}%</div>
                                <div className="text-[9px] text-textDim tracking-widest uppercase font-mono">Task Completion</div>
                             </div>
                        </div>

                        {/* Action Buttons */}
                        <div className="flex gap-4 mt-10">
                             <button onClick={() => setIsCreating(true)} className="bg-gold text-bgDeep hover:bg-yellow-500 px-8 py-3 text-[11px] tracking-[0.15em] font-mono font-bold rounded-sm transition-colors shadow-[0_0_15px_rgba(212,175,55,0.1)]">
                                 NEW MANUSCRIPT
                             </button>
                        </div>
                    </div>

                    {isCreating && (
                        <div className="bg-bgCard border border-borderFaint p-8 rounded-xl mb-12 shadow-2xl max-w-2xl mx-auto relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-goldDim to-transparent opacity-50"></div>
                            <h2 className="text-xl text-gold mb-6 font-serif text-center">Open New Entry</h2>
                            <form onSubmit={handleCreate} className="space-y-6">
                                <div>
                                    <label className="block text-[10px] text-textDim mb-2 font-mono uppercase tracking-widest">Title</label>
                                    <input required type="text" value={newProj.title} onChange={e => setNewProj({...newProj, title: e.target.value})} className="w-full bg-bgDeep border border-borderFaint p-3 text-gold rounded font-serif text-lg focus:border-goldDim transition-colors" placeholder="Enter title..." />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-[10px] text-textDim mb-2 font-mono uppercase tracking-widest">Format</label>
                                        <select value={newProj.type} onChange={e => setNewProj({...newProj, type: e.target.value})} className="w-full bg-bgDeep border border-borderFaint p-3 text-gold rounded font-mono text-xs focus:border-goldDim">
                                            {shelves.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-textDim mb-2 font-mono uppercase tracking-widest">Target Deadline</label>
                                        <input type="date" value={newProj.deadline} onChange={e => setNewProj({...newProj, deadline: e.target.value})} className="w-full bg-bgDeep border border-borderFaint p-3 text-gold rounded font-mono text-xs focus:border-goldDim" style={{colorScheme: 'dark'}} />
                                    </div>
                                </div>
                                <div className="flex gap-4 justify-center pt-4">
                                    <button type="submit" className="border border-gold text-gold hover:bg-gold hover:text-bgDeep px-6 py-2 text-[10px] tracking-widest font-mono rounded transition-colors">INITIATE</button>
                                    <button type="button" onClick={() => setIsCreating(false)} className="text-textDim hover:text-gold px-6 py-2 text-[10px] tracking-widest font-mono transition-colors">CANCEL</button>
                                </div>
                            </form>
                        </div>
                    )}

                    <div className="space-y-16">
                        {shelves.map(shelf => {
                            const shelfProjects = projects.filter(p => p.type === shelf);
                            if (shelfProjects.length === 0) return null;
                            
                            return (
                                <section key={shelf}>
                                    <h3 className="text-textDim text-[11px] tracking-[0.3em] uppercase font-mono mb-6 flex items-center gap-4">
                                        {shelf} <span className="flex-1 h-px bg-borderFaint"></span>
                                    </h3>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                        {shelfProjects.map(proj => (
                                            <div key={proj.id} onClick={() => openProject(proj.id)} className="bg-bgCard border border-borderFaint hover:border-goldDim p-6 rounded-2xl cursor-pointer group transition-all relative">
                                                <div className="flex justify-between items-start mb-4">
                                                    <h3 className="text-lg text-gold font-serif leading-snug group-hover:glow-text transition-all">{proj.title}</h3>
                                                </div>
                                                
                                                <div className="mt-8 flex items-center justify-between border-t border-borderFaint pt-4">
                                                    <span className="text-[10px] font-mono text-textDim flex items-center gap-2">
                                                        <i className="ph ph-calendar-blank text-goldDim"></i> {proj.deadline ? new Date(proj.deadline).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) : 'No date'}
                                                    </span>
                                                    <span className="text-[10px] bg-bgDeep px-2 py-1 rounded text-textDim font-mono border border-borderFaint">
                                                        {proj.scenes?.length || 0} SCENES
                                                    </span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            )
                        })}
                    </div>
                </div>
            );
        };

        const Editor = ({ project, updateProject, closeEditor }) => {
            const [activeSceneId, setActiveSceneId] = useState(project.scenes[0]?.id || null);
            const [isDistractionFree, setIsDistractionFree] = useState(false);
            const [rightTab, setRightTab] = useState('todo'); 

            const activeScene = project.scenes.find(s => s.id === activeSceneId);

            const addScene = () => {
                const newScene = { id: Date.now().toString(), title: 'Untitled Scene', content: '' };
                updateProject({ ...project, scenes: [...project.scenes, newScene] });
                setActiveSceneId(newScene.id);
            };

            const updateScene = (content) => {
                const newScenes = project.scenes.map(s => s.id === activeSceneId ? { ...s, content } : s);
                updateProject({ ...project, scenes: newScenes });
            };

            const updateSceneTitle = (title) => {
                const newScenes = project.scenes.map(s => s.id === activeSceneId ? { ...s, title } : s);
                updateProject({ ...project, scenes: newScenes });
            };

            const wordCount = activeScene ? activeScene.content.trim().split(/\s+/).filter(w => w.length > 0).length : 0;

            const addTask = (e) => {
                if(e.key === 'Enter' && e.target.value.trim()) {
                    const newTask = { id: Date.now().toString(), text: e.target.value, completed: false };
                    updateProject({ ...project, tasks: [...(project.tasks || []), newTask] });
                    e.target.value = '';
                }
            };
            const toggleTask = (taskId) => {
                const newTasks = project.tasks.map(t => t.id === taskId ? { ...t, completed: !t.completed } : t);
                updateProject({ ...project, tasks: newTasks });
            };

            return (
                <div className={`flex h-screen w-full bg-bgDeep ${isDistractionFree ? 'distraction-free' : ''}`}>
                    {/* Left Sidebar: Binder */}
                    {!isDistractionFree && (
                        <div className="w-64 bg-bgCard border-r border-borderFaint flex flex-col h-full shrink-0">
                            <div className="p-5 border-b border-borderFaint flex items-center justify-between">
                                <button onClick={closeEditor} className="text-textDim hover:text-gold transition-colors"><i className="ph ph-arrow-left text-xl"></i></button>
                                <span className="text-[10px] font-mono tracking-widest text-goldDim uppercase">Binder</span>
                                <button onClick={addScene} className="text-textDim hover:text-gold transition-colors"><i className="ph ph-plus text-xl"></i></button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 space-y-2">
                                {project.scenes.map((scene, idx) => (
                                    <div 
                                        key={scene.id} 
                                        onClick={() => setActiveSceneId(scene.id)}
                                        className={`p-3 rounded-lg cursor-pointer text-sm transition-all border ${activeSceneId === scene.id ? 'bg-bgDeep border-goldDim text-gold' : 'border-transparent text-textDim hover:border-borderFaint hover:text-goldDim'}`}
                                    >
                                        <div className="text-[9px] font-mono tracking-widest uppercase mb-1 opacity-60">Scene {idx + 1}</div>
                                        <div className="font-serif truncate">{scene.title}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Center: Editor Area */}
                    <div className="flex-1 flex flex-col h-full relative">
                        {!isDistractionFree && activeScene && (
                            <div className="h-16 border-b border-borderFaint flex items-center justify-between px-8 shrink-0 bg-bgDeep">
                                <input 
                                    type="text" 
                                    value={activeScene.title} 
                                    onChange={(e) => updateSceneTitle(e.target.value)}
                                    className="bg-transparent text-2xl font-serif text-gold focus:outline-none w-2/3"
                                />
                                <div className="flex items-center gap-6 text-textDim font-mono text-xs">
                                    <span>{wordCount} W</span>
                                    <button onClick={() => setIsDistractionFree(true)} title="Focus Mode" className="hover:text-gold transition-colors">
                                        <i className="ph ph-corners-out text-lg"></i>
                                    </button>
                                </div>
                            </div>
                        )}
                        
                        {isDistractionFree && (
                            <button onClick={() => setIsDistractionFree(false)} className="fixed top-6 right-6 text-textDim hover:text-gold opacity-30 hover:opacity-100 transition-opacity z-50">
                                <i className="ph ph-corners-in text-2xl"></i>
                            </button>
                        )}

                        <div className="flex-1 overflow-hidden p-8 max-w-3xl mx-auto w-full">
                            {activeScene ? (
                                <textarea
                                    className="w-full h-full bg-transparent text-[#e0e0e0] text-lg leading-loose resize-none font-body custom-scrollbar placeholder-textFaint"
                                    value={activeScene.content}
                                    onChange={(e) => updateScene(e.target.value)}
                                    placeholder="The ink awaits..."
                                />
                            ) : (
                                <div className="h-full flex items-center justify-center text-textFaint font-mono text-sm tracking-widest uppercase">Select a scene from the binder.</div>
                            )}
                        </div>
                    </div>

                    {/* Right Sidebar: Tools */}
                    {!isDistractionFree && (
                        <div className="w-80 bg-bgCard border-l border-borderFaint flex flex-col h-full shrink-0">
                            <div className="flex border-b border-borderFaint">
                                <button onClick=                                        {shelf === 'Audiobook Script' && <i className="ph ph-headphones"></i>}
                                        {shelf === 'Novel' && <i className="ph ph-book-open-text"></i>}
                                        {shelf === 'Video Script' && <i className="ph ph-film-strip"></i>}
                                        {shelf === 'Shorts Script' && <i className="ph ph-device-mobile"></i>}
                                        {shelf} Shelf
                                    </h2>
                                    {shelfProjects.length === 0 ? (
                                        <p className="text-gray-600 italic text-sm">No projects currently on this shelf.</p>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {shelfProjects.map(proj => (
                                                <div key={proj.id} onClick={() => openProject(proj.id)} className="bg-darkBg border border-gray-800 hover:border-mysticPurple/60 p-5 rounded-lg cursor-pointer group transition-all relative overflow-hidden">
                                                    <div className="absolute top-0 right-0 w-16 h-16 bg-mysticPurple/10 rounded-bl-full -z-10 group-hover:bg-mysticPurple/20 transition-colors"></div>
                                                    <div className="flex justify-between items-start mb-2">
                                                        <h3 className="text-lg text-parchment font-semibold leading-tight">{proj.title}</h3>
                                                        <span className="text-[10px] px-2 py-1 bg-gray-800 text-gray-300 rounded uppercase tracking-wider">{proj.status}</span>
                                                    </div>
                                                    <div className="text-xs text-gray-400 mt-4 flex items-center justify-between">
                                                        <span><i className="ph ph-clock mr-1"></i> {proj.deadline || 'No deadline'}</span>
                                                        <span>{proj.scenes?.length || 0} Scenes</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </section>
                            )
                        })}
                    </div>
                </div>
            );
        };

        const Editor = ({ project, updateProject, closeEditor }) => {
            const [activeSceneId, setActiveSceneId] = useState(project.scenes[0]?.id || null);
            const [isDistractionFree, setIsDistractionFree] = useState(false);
            const [rightTab, setRightTab] = useState('todo'); // 'todo' or 'ai'

            const activeScene = project.scenes.find(s => s.id === activeSceneId);

            const addScene = () => {
                const newScene = { id: Date.now().toString(), title: 'New Scene', content: '' };
                updateProject({ ...project, scenes: [...project.scenes, newScene] });
                setActiveSceneId(newScene.id);
            };

            const updateScene = (content) => {
                const newScenes = project.scenes.map(s => s.id === activeSceneId ? { ...s, content } : s);
                updateProject({ ...project, scenes: newScenes });
            };

            const updateSceneTitle = (title) => {
                const newScenes = project.scenes.map(s => s.id === activeSceneId ? { ...s, title } : s);
                updateProject({ ...project, scenes: newScenes });
            };

            const wordCount = activeScene ? activeScene.content.trim().split(/\s+/).filter(w => w.length > 0).length : 0;
            const totalWordCount = project.scenes.reduce((acc, scene) => acc + scene.content.trim().split(/\s+/).filter(w => w.length > 0).length, 0);

            // Task Management
            const addTask = (e) => {
                if(e.key === 'Enter' && e.target.value.trim()) {
                    const newTask = { id: Date.now().toString(), text: e.target.value, completed: false };
                    updateProject({ ...project, tasks: [...(project.tasks || []), newTask] });
                    e.target.value = '';
                }
            };
            const toggleTask = (taskId) => {
                const newTasks = project.tasks.map(t => t.id === taskId ? { ...t, completed: !t.completed } : t);
                updateProject({ ...project, tasks: newTasks });
            };

            return (
                <div className={`flex h-screen w-full bg-darkerBg ${isDistractionFree ? 'distraction-free' : ''}`}>
                    {/* Left Sidebar: Binder */}
                    {!isDistractionFree && (
                        <div className="w-64 bg-darkBg border-r border-gray-800 flex flex-col h-full shrink-0">
                            <div className="p-4 border-b border-gray-800 flex items-center justify-between">
                                <button onClick={closeEditor} className="text-gray-400 hover:text-parchment"><i className="ph ph-arrow-left text-xl"></i></button>
                                <span className="text-sm font-display text-mysticPurpleLight truncate ml-2">Binder</span>
                                <button onClick={addScene} className="text-gray-400 hover:text-parchment"><i className="ph ph-plus text-xl"></i></button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1">
                                {project.scenes.map(scene => (
                                    <div 
                                        key={scene.id} 
                                        onClick={() => setActiveSceneId(scene.id)}
                                        className={`p-2 rounded cursor-pointer text-sm truncate transition-colors flex items-center gap-2
                                            ${activeSceneId === scene.id ? 'bg-mysticPurple/20 text-parchment border-l-2 border-mysticPurpleLight' : 'text-gray-400 hover:bg-gray-900'}`}
                                    >
                                        <i className="ph ph-file-text"></i> {scene.title}
                                    </div>
                                ))}
                            </div>
                            <div className="p-4 border-t border-gray-800 text-xs text-gray-500">
                                Total Words: <span className="text-parchment">{totalWordCount}</span>
                            </div>
                        </div>
                    )}

                    {/* Center: Editor Area */}
                    <div className="flex-1 flex flex-col h-full relative">
                        {/* Editor Top Bar */}
                        {!isDistractionFree && activeScene && (
                            <div className="h-14 border-b border-gray-800 flex items-center justify-between px-6 shrink-0">
                                <input 
                                    type="text" 
                                    value={activeScene.title} 
                                    onChange={(e) => updateSceneTitle(e.target.value)}
                                    className="bg-transparent text-xl font-display text-parchment focus:outline-none w-1/2"
                                />
                                <div className="flex items-center gap-4 text-gray-400">
                                    <span className="text-sm">{wordCount} words</span>
                                    <button onClick={() => setIsDistractionFree(true)} title="Focus Mode" className="hover:text-parchment">
                                        <i className="ph ph-corners-out text-xl"></i>
                                    </button>
                                </div>
                            </div>
                        )}
                        
                        {/* Distraction Free Escape */}
                        {isDistractionFree && (
                            <button onClick={() => setIsDistractionFree(false)} className="fixed top-4 right-4 text-gray-500 hover:text-parchment opacity-50 hover:opacity-100 transition-opacity z-50">
                                <i className="ph ph-corners-in text-2xl"></i>
                            </button>
                        )}

                        {/* Text Area */}
                        <div className="flex-1 overflow-hidden p-6 max-w-4xl mx-auto w-full">
                            {activeScene ? (
                                <textarea
                                    className="w-full h-full bg-transparent text-inkText text-lg leading-relaxed resize-none font-body custom-scrollbar"
                                    value={activeScene.content}
                                    onChange={(e) => updateScene(e.target.value)}
                                    placeholder="Begin writing your manuscript here (English or Bangla)..."
                                />
                            ) : (
                                <div className="h-full flex items-center justify-center text-gray-600">Select or create a scene from the binder.</div>
                            )}
                        </div>
                    </div>

                    {/* Right Sidebar: Tools (AI & Tasks) */}
                    {!isDistractionFree && (
                        <div className="w-80 bg-darkBg border-l border-gray-800 flex flex-col h-full shrink-0">
                            <div className="flex border-b border-gray-800">
                                <button onClick={() => setRightTab('todo')} className={`flex-1 py-3 text-sm font-semibold uppercase tracking-wider ${rightTab === 'todo' ? 'text-parchment border-b-2 border-mysticPurpleLight bg-gray-900/50' : 'text-gray-500 hover:text-gray-300'}`}>To-Do</button>
                                <button onClick={() => setRightTab('ai')} className={`flex-1 py-3 text-sm font-semibold uppercase tracking-wider ${rightTab === 'ai' ? 'text-parchment border-b-2 border-mysticPurpleLight bg-gray-900/50' : 'text-gray-500 hover:text-gray-300'}`}><i className="ph ph-sparkle mr-1"></i> AI</button>
                            </div>

                            <div className="flex-1 overflow-y-auto p-4">
                                {rightTab === 'todo' && (
                                    <div>
                                        <input 
                                            type="text" 
                                            placeholder="+ Add new task (Press Enter)" 
                                            onKeyDown={addTask}
                                            className="w-full bg-darkerBg border border-gray-700 rounded p-2 text-sm text-parchment mb-4"
                                        />
                                        <div className="space-y-2">
                                            {(project.tasks || []).map(task => (
                                                <div key={task.id} className="flex items-start gap-3 group">
                                                    <button onClick={() => toggleTask(task.id)} className={`mt-1 flex-shrink-0 w-4 h-4 rounded border ${task.completed ? 'bg-mysticPurpleLight border-mysticPurpleLight text-darkBg' : 'border-gray-500'} flex items-center justify-center`}>
                                                        {task.completed && <i className="ph ph-check text-xs"></i>}
                                                    </button>
                                                    <span className={`text-sm ${task.completed ? 'line-through text-gray-600' : 'text-gray-300'}`}>{task.text}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {rightTab === 'ai' && (
                                    <div className="space-y-6">
                                        <div className="bg-darkerBg p-3 rounded border border-gray-800">
                                            <h4 className="text-xs text-mysticPurpleLight uppercase tracking-widest mb-2 font-bold">Memory Mode</h4>
                                            <select className="w-full bg-darkBg text-xs text-parchment p-2 rounded border border-gray-700">
                                                <option value="project">🟣 Project Memory (Current)</option>
                                                <option value="shared">🔵 Shared Universe Memory</option>
                                            </select>
                                        </div>
                                        
                                        <div className="space-y-2">
                                            <h4 className="text-xs text-gray-500 uppercase tracking-widest mb-2">Assist Tools</h4>
                                            {['Write & Continue', 'Translate (BN ↔ EN)', 'Format Script', 'Brainstorm Ideas', 'Proofread & Tone Check'].map(tool => (
                                                <button key={tool} className="w-full text-left bg-darkerBg hover:bg-gray-800 border border-gray-800 hover:border-mysticPurple p-3 rounded text-sm text-gray-300 transition-colors flex items-center justify-between group">
                                                    {tool} <i className="ph ph-arrow-right opacity-0 group-hover:opacity-100 text-mysticPurpleLight transition-opacity"></i>
                                                </button>
                                            ))}
                                        </div>
                                        <p className="text-[10px] text-gray-600 italic mt-4 text-center">Gemini API Integration Placeholder</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- MAIN APP RENDERER ---

        const App = () => {
            const [projects, setProjects] = useLocalStorage('gkk-projects', []);
            const [activeProjectId, setActiveProjectId] = useState(null);

            const activeProject = projects.find(p => p.id === activeProjectId);

            const updateActiveProject = (updatedProject) => {
                setProjects(projects.map(p => p.id === updatedProject.id ? updatedProject : p));
            };

            return (
                <div className="min-h-screen selection:bg-mysticPurple selection:text-white">
                    {activeProject ? (
                        <Editor 
                            project={activeProject} 
                            updateProject={updateActiveProject} 
                            closeEditor={() => setActiveProjectId(null)} 
                        />
                    ) : (
                        <Dashboard 
                            projects={projects} 
                            setProjects={setProjects} 
                            openProject={setActiveProjectId} 
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
