<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golpoboliyer Kheror Khata | গল্পবলিয়ের খেরোর খাতা</title>
    <meta name="theme-color" content="#020617">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+Bengali:wght@400;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b0c10',
                        darkerBg: '#050507',
                        parchment: '#fef3c7',
                        mysticPurple: '#4c1d95',
                        mysticPurpleLight: '#8b5cf6',
                        inkText: '#c5c6c7'
                    },
                    fontFamily: {
                        display: ['Cinzel', 'serif'],
                        body: ['Merriweather', 'Noto Serif Bengali', 'serif']
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { background-color: #050507; color: #c5c6c7; font-family: 'Merriweather', 'Noto Serif Bengali', serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0c10; }
        ::-webkit-scrollbar-thumb { background: #4c1d95; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b5cf6; }
        .distraction-free { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 50; background: #000; padding: 2rem 10%; }
        textarea:focus { outline: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom hook for local storage
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.error(error);
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error(error);
                }
            };
            return [storedValue, setValue];
        }

        // --- COMPONENTS ---

        const Dashboard = ({ projects, setProjects, openProject }) => {
            const [isCreating, setIsCreating] = useState(false);
            const [newProj, setNewProj] = useState({ title: '', type: 'Audiobook Script', status: 'Active', deadline: '' });

            const shelves = ['Audiobook Script', 'Novel', 'Video Script', 'Shorts Script'];

            const handleCreate = (e) => {
                e.preventDefault();
                const project = {
                    id: Date.now().toString(),
                    ...newProj,
                    createdAt: new Date().toISOString(),
                    scenes: [{ id: Date.now().toString() + 's', title: 'Chapter 1 / Scene 1', content: '' }],
                    tasks: []
                };
                setProjects([...projects, project]);
                setIsCreating(false);
                setNewProj({ title: '', type: 'Audiobook Script', status: 'Active', deadline: '' });
            };

            return (
                <div className="p-6 max-w-7xl mx-auto">
                    <header className="flex justify-between items-center mb-12 border-b border-mysticPurple/30 pb-4">
                        <h1 className="text-3xl font-display text-parchment tracking-wider flex items-center gap-3">
                            <i className="ph ph-scroll text-mysticPurpleLight"></i>
                            গল্পবলিয়ের খেরোর খাতা
                        </h1>
                        <button onClick={() => setIsCreating(true)} className="bg-mysticPurple hover:bg-mysticPurpleLight text-parchment px-4 py-2 rounded shadow-lg transition-colors flex items-center gap-2">
                            <i className="ph ph-plus-circle"></i> New Project
                        </button>
                    </header>

                    {isCreating && (
                        <div className="bg-darkBg p-6 rounded-lg border border-mysticPurple/50 mb-8 shadow-2xl">
                            <h2 className="text-xl text-parchment mb-4 font-display">Create New Manuscript</h2>
                            <form onSubmit={handleCreate} className="flex flex-wrap gap-4 items-end">
                                <div className="flex-1 min-w-[200px]">
                                    <label className="block text-xs text-mysticPurpleLight mb-1 uppercase tracking-wider">Title</label>
                                    <input required type="text" value={newProj.title} onChange={e => setNewProj({...newProj, title: e.target.value})} className="w-full bg-darkerBg border border-gray-700 p-2 text-parchment rounded" placeholder="Enter title (English or Bangla)..." />
                                </div>
                                <div>
                                    <label className="block text-xs text-mysticPurpleLight mb-1 uppercase tracking-wider">Type</label>
                                    <select value={newProj.type} onChange={e => setNewProj({...newProj, type: e.target.value})} className="bg-darkerBg border border-gray-700 p-2 text-parchment rounded">
                                        {shelves.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-xs text-mysticPurpleLight mb-1 uppercase tracking-wider">Deadline</label>
                                    <input type="date" value={newProj.deadline} onChange={e => setNewProj({...newProj, deadline: e.target.value})} className="bg-darkerBg border border-gray-700 p-2 text-parchment rounded" style={{colorScheme: 'dark'}} />
                                </div>
                                <div className="flex gap-2">
                                    <button type="submit" className="bg-mysticPurple text-parchment px-4 py-2 rounded">Create</button>
                                    <button type="button" onClick={() => setIsCreating(false)} className="text-gray-400 px-4 py-2 hover:text-white">Cancel</button>
                                </div>
                            </form>
                        </div>
                    )}

                    <div className="space-y-12">
                        {shelves.map(shelf => {
                            const shelfProjects = projects.filter(p => p.type === shelf);
                            return (
                                <section key={shelf}>
                                    <h2 className="text-xl font-display text-mysticPurpleLight border-b border-gray-800 pb-2 mb-4 flex items-center gap-2">
                                        {shelf === 'Audiobook Script' && <i className="ph ph-headphones"></i>}
                                        {shelf === 'Novel' && <i className="ph ph-book-open-text"></i>}
                                        {shelf === 'Video Script' && <i className="ph ph-film-strip"></i>}
                                        {shelf === 'Shorts Script' && <i className="ph ph-device-mobile"></i>}
                                        {shelf} Shelf
                                    </h2>
                                    {shelfProjects.length === 0 ? (
                                        <p className="text-gray-600 italic text-sm">No projects currently on this shelf.</p>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {shelfProjects.map(proj => (
                                                <div key={proj.id} onClick={() => openProject(proj.id)} className="bg-darkBg border border-gray-800 hover:border-mysticPurple/60 p-5 rounded-lg cursor-pointer group transition-all relative overflow-hidden">
                                                    <div className="absolute top-0 right-0 w-16 h-16 bg-mysticPurple/10 rounded-bl-full -z-10 group-hover:bg-mysticPurple/20 transition-colors"></div>
                                                    <div className="flex justify-between items-start mb-2">
                                                        <h3 className="text-lg text-parchment font-semibold leading-tight">{proj.title}</h3>
                                                        <span className="text-[10px] px-2 py-1 bg-gray-800 text-gray-300 rounded uppercase tracking-wider">{proj.status}</span>
                                                    </div>
                                                    <div className="text-xs text-gray-400 mt-4 flex items-center justify-between">
                                                        <span><i className="ph ph-clock mr-1"></i> {proj.deadline || 'No deadline'}</span>
                                                        <span>{proj.scenes?.length || 0} Scenes</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </section>
                            )
                        })}
                    </div>
                </div>
            );
        };

        const Editor = ({ project, updateProject, closeEditor }) => {
            const [activeSceneId, setActiveSceneId] = useState(project.scenes[0]?.id || null);
            const [isDistractionFree, setIsDistractionFree] = useState(false);
            const [rightTab, setRightTab] = useState('todo'); // 'todo' or 'ai'

            const activeScene = project.scenes.find(s => s.id === activeSceneId);

            const addScene = () => {
                const newScene = { id: Date.now().toString(), title: 'New Scene', content: '' };
                updateProject({ ...project, scenes: [...project.scenes, newScene] });
                setActiveSceneId(newScene.id);
            };

            const updateScene = (content) => {
                const newScenes = project.scenes.map(s => s.id === activeSceneId ? { ...s, content } : s);
                updateProject({ ...project, scenes: newScenes });
            };

            const updateSceneTitle = (title) => {
                const newScenes = project.scenes.map(s => s.id === activeSceneId ? { ...s, title } : s);
                updateProject({ ...project, scenes: newScenes });
            };

            const wordCount = activeScene ? activeScene.content.trim().split(/\s+/).filter(w => w.length > 0).length : 0;
            const totalWordCount = project.scenes.reduce((acc, scene) => acc + scene.content.trim().split(/\s+/).filter(w => w.length > 0).length, 0);

            // Task Management
            const addTask = (e) => {
                if(e.key === 'Enter' && e.target.value.trim()) {
                    const newTask = { id: Date.now().toString(), text: e.target.value, completed: false };
                    updateProject({ ...project, tasks: [...(project.tasks || []), newTask] });
                    e.target.value = '';
                }
            };
            const toggleTask = (taskId) => {
                const newTasks = project.tasks.map(t => t.id === taskId ? { ...t, completed: !t.completed } : t);
                updateProject({ ...project, tasks: newTasks });
            };

            return (
                <div className={`flex h-screen w-full bg-darkerBg ${isDistractionFree ? 'distraction-free' : ''}`}>
                    {/* Left Sidebar: Binder */}
                    {!isDistractionFree && (
                        <div className="w-64 bg-darkBg border-r border-gray-800 flex flex-col h-full shrink-0">
                            <div className="p-4 border-b border-gray-800 flex items-center justify-between">
                                <button onClick={closeEditor} className="text-gray-400 hover:text-parchment"><i className="ph ph-arrow-left text-xl"></i></button>
                                <span className="text-sm font-display text-mysticPurpleLight truncate ml-2">Binder</span>
                                <button onClick={addScene} className="text-gray-400 hover:text-parchment"><i className="ph ph-plus text-xl"></i></button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-2 space-y-1">
                                {project.scenes.map(scene => (
                                    <div 
                                        key={scene.id} 
                                        onClick={() => setActiveSceneId(scene.id)}
                                        className={`p-2 rounded cursor-pointer text-sm truncate transition-colors flex items-center gap-2
                                            ${activeSceneId === scene.id ? 'bg-mysticPurple/20 text-parchment border-l-2 border-mysticPurpleLight' : 'text-gray-400 hover:bg-gray-900'}`}
                                    >
                                        <i className="ph ph-file-text"></i> {scene.title}
                                    </div>
                                ))}
                            </div>
                            <div className="p-4 border-t border-gray-800 text-xs text-gray-500">
                                Total Words: <span className="text-parchment">{totalWordCount}</span>
                            </div>
                        </div>
                    )}

                    {/* Center: Editor Area */}
                    <div className="flex-1 flex flex-col h-full relative">
                        {/* Editor Top Bar */}
                        {!isDistractionFree && activeScene && (
                            <div className="h-14 border-b border-gray-800 flex items-center justify-between px-6 shrink-0">
                                <input 
                                    type="text" 
                                    value={activeScene.title} 
                                    onChange={(e) => updateSceneTitle(e.target.value)}
                                    className="bg-transparent text-xl font-display text-parchment focus:outline-none w-1/2"
                                />
                                <div className="flex items-center gap-4 text-gray-400">
                                    <span className="text-sm">{wordCount} words</span>
                                    <button onClick={() => setIsDistractionFree(true)} title="Focus Mode" className="hover:text-parchment">
                                        <i className="ph ph-corners-out text-xl"></i>
                                    </button>
                                </div>
                            </div>
                        )}
                        
                        {/* Distraction Free Escape */}
                        {isDistractionFree && (
                            <button onClick={() => setIsDistractionFree(false)} className="fixed top-4 right-4 text-gray-500 hover:text-parchment opacity-50 hover:opacity-100 transition-opacity z-50">
                                <i className="ph ph-corners-in text-2xl"></i>
                            </button>
                        )}

                        {/* Text Area */}
                        <div className="flex-1 overflow-hidden p-6 max-w-4xl mx-auto w-full">
                            {activeScene ? (
                                <textarea
                                    className="w-full h-full bg-transparent text-inkText text-lg leading-relaxed resize-none font-body custom-scrollbar"
                                    value={activeScene.content}
                                    onChange={(e) => updateScene(e.target.value)}
                                    placeholder="Begin writing your manuscript here (English or Bangla)..."
                                />
                            ) : (
                                <div className="h-full flex items-center justify-center text-gray-600">Select or create a scene from the binder.</div>
                            )}
                        </div>
                    </div>

                    {/* Right Sidebar: Tools (AI & Tasks) */}
                    {!isDistractionFree && (
                        <div className="w-80 bg-darkBg border-l border-gray-800 flex flex-col h-full shrink-0">
                            <div className="flex border-b border-gray-800">
                                <button onClick={() => setRightTab('todo')} className={`flex-1 py-3 text-sm font-semibold uppercase tracking-wider ${rightTab === 'todo' ? 'text-parchment border-b-2 border-mysticPurpleLight bg-gray-900/50' : 'text-gray-500 hover:text-gray-300'}`}>To-Do</button>
                                <button onClick={() => setRightTab('ai')} className={`flex-1 py-3 text-sm font-semibold uppercase tracking-wider ${rightTab === 'ai' ? 'text-parchment border-b-2 border-mysticPurpleLight bg-gray-900/50' : 'text-gray-500 hover:text-gray-300'}`}><i className="ph ph-sparkle mr-1"></i> AI</button>
                            </div>

                            <div className="flex-1 overflow-y-auto p-4">
                                {rightTab === 'todo' && (
                                    <div>
                                        <input 
                                            type="text" 
                                            placeholder="+ Add new task (Press Enter)" 
                                            onKeyDown={addTask}
                                            className="w-full bg-darkerBg border border-gray-700 rounded p-2 text-sm text-parchment mb-4"
                                        />
                                        <div className="space-y-2">
                                            {(project.tasks || []).map(task => (
                                                <div key={task.id} className="flex items-start gap-3 group">
                                                    <button onClick={() => toggleTask(task.id)} className={`mt-1 flex-shrink-0 w-4 h-4 rounded border ${task.completed ? 'bg-mysticPurpleLight border-mysticPurpleLight text-darkBg' : 'border-gray-500'} flex items-center justify-center`}>
                                                        {task.completed && <i className="ph ph-check text-xs"></i>}
                                                    </button>
                                                    <span className={`text-sm ${task.completed ? 'line-through text-gray-600' : 'text-gray-300'}`}>{task.text}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {rightTab === 'ai' && (
                                    <div className="space-y-6">
                                        <div className="bg-darkerBg p-3 rounded border border-gray-800">
                                            <h4 className="text-xs text-mysticPurpleLight uppercase tracking-widest mb-2 font-bold">Memory Mode</h4>
                                            <select className="w-full bg-darkBg text-xs text-parchment p-2 rounded border border-gray-700">
                                                <option value="project">🟣 Project Memory (Current)</option>
                                                <option value="shared">🔵 Shared Universe Memory</option>
                                            </select>
                                        </div>
                                        
                                        <div className="space-y-2">
                                            <h4 className="text-xs text-gray-500 uppercase tracking-widest mb-2">Assist Tools</h4>
                                            {['Write & Continue', 'Translate (BN ↔ EN)', 'Format Script', 'Brainstorm Ideas', 'Proofread & Tone Check'].map(tool => (
                                                <button key={tool} className="w-full text-left bg-darkerBg hover:bg-gray-800 border border-gray-800 hover:border-mysticPurple p-3 rounded text-sm text-gray-300 transition-colors flex items-center justify-between group">
                                                    {tool} <i className="ph ph-arrow-right opacity-0 group-hover:opacity-100 text-mysticPurpleLight transition-opacity"></i>
                                                </button>
                                            ))}
                                        </div>
                                        <p className="text-[10px] text-gray-600 italic mt-4 text-center">Gemini API Integration Placeholder</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- MAIN APP RENDERER ---

        const App = () => {
            const [projects, setProjects] = useLocalStorage('gkk-projects', []);
            const [activeProjectId, setActiveProjectId] = useState(null);

            const activeProject = projects.find(p => p.id === activeProjectId);

            const updateActiveProject = (updatedProject) => {
                setProjects(projects.map(p => p.id === updatedProject.id ? updatedProject : p));
            };

            return (
                <div className="min-h-screen selection:bg-mysticPurple selection:text-white">
                    {activeProject ? (
                        <Editor 
                            project={activeProject} 
                            updateProject={updateActiveProject} 
                            closeEditor={() => setActiveProjectId(null)} 
                        />
                    ) : (
                        <Dashboard 
                            projects={projects} 
                            setProjects={setProjects} 
                            openProject={setActiveProjectId} 
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
